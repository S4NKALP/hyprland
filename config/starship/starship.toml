## ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖÄ‚ĖĎ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖĎ

# Sets user-defined palette
palette = "catppuccin_mocha"

# Setups
format="$directory$git_branch$character"
right_format = """$git_status$cmd_duration"""
add_newline = false 

# Other languages configurations:
c.disabled = true
cmake.disabled = true
haskell.disabled = true
python.disabled = true
ruby.disabled = true
rust.disabled = true
perl.disabled = true
package.disabled = true
lua.disabled = true
nodejs.disabled = true
java.disabled = true
golang.disabled = true

[conda]
format = ' [$symbol$environment](dimmed green) '

# Prompt symbols 
[character]
success_symbol = "[Ó©Ī](green bold)"
error_symbol = "[Ó™ľ](pink)"
vicmd_symbol = "[ÓüÖ](peach)"

[directory]
format = "[Óā∂]($style)[ÓóŅ ](bg:base fg:pink)[$path](bg:base fg:lavender bold)[Óāī ]($style)"
style = "bg:none fg:base"
truncation_length = 3
truncate_to_repo=false

[git_branch]
format = "[Óā∂]($style)[[Ó¨ß ](bg:base fg:green bold)$branch](bg:base fg:lavender)[Óāī ]($style)"
style = "bg:none fg:base"

[git_status]
# $all status$ahead_behind
format = "[Óā∂]($style)[$all_status$ahead_behind](bg:base fg:yellow)[Óāī ]($style)"
style = "bg:none fg:base"
conflicted = "="
ahead =	"‚á°${count}"
behind = "‚á£${count}"
diverged = "‚áē‚á°${ahead_count}‚á£${behind_count}"
up_to_date = "Ôėę"
untracked = "?${count}"
stashed = "Ô£ē"
modified = "!${count}"
staged = "+${count}"
renamed = "¬Ľ${count}"
deleted = "Ôôē${count}"

[git_commit]
format = "[\\($hash\\)]($style) [\\($tag\\)]($style)"
style = "green"

[git_state]
rebase = "REBASING"
merge =	"MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"
style =	"yellow"
format = '\([$state( $progress_current/$progress_total)]($style)\) '

[cmd_duration]
min_time = 1
# duration & style 
format = "[Óā∂]($style)[[ůįĒö ](bg:base fg:flamingo bold)$duration](bg:base fg:text)[Óāī ]($style)"
disabled = false
style = "bg:none fg:base"

